    }catch(e){toast('Error: '+e.message);}
}

function doExportPDFNow(){
    console.log('EXPORTING PDF...');
    if(!passwords||passwords.length===0){toast('No data to export!');return;}
    try{
        var doc=new jspdf.jsPDF();
        doc.setFontSize(16);doc.setTextColor(99,102,241);
        doc.text('Password Vault Backup',14,16);
        var body=[];
        for(var i=0;i<passwords.length;i++){body.push([i+1,passwords[i].plat,passwords[i].user,passwords[i].pass,passwords[i].url||'']);}
        doc.autoTable({startY:22,head:[['#','Platform','Username','Password','URL']],body:body,theme:'grid',headStyles:{fillColor:[99,102,241]},styles:{fontSize:7}});
        doc.save('Vault_Backup_'+new Date().toISOString().slice(0,10)+'.pdf');
        toast('✅ PDF downloaded! Check your downloads folder.');
    }catch(e){toast('Error: '+e.message);}
}

// ===== DATA =====
let passwords=[],filter='all',editId=null;
const CATS={google:{n:'Google',c:'#ea4335',l:'G',u:'https://google.com'},facebook:{n:'Facebook',c:'#1877f2',l:'f',u:'https://facebook.com'},instagram:{n:'Instagram',c:'#e4405f',l:'📸',u:'https://instagram.com'},whatsapp:{n:'WhatsApp',c:'#25d366',l:'💬',u:'https://web.whatsapp.com'},youtube:{n:'YouTube',c:'#ff0000',l:'▶',u:'https://youtube.com'},tiktok:{n:'TikTok',c:'#000',l:'🎵',u:'https://tiktok.com'},x:{n:'X',c:'#1da1f2',l:'𝕏',u:'https://x.com'},linkedin:{n:'LinkedIn',c:'#0a66c2',l:'in',u:'https://linkedin.com'},netflix:{n:'Netflix',c:'#e50914',l:'N',u:'https://netflix.com'},amazon:{n:'Amazon',c:'#ff9900',l:'A',u:'https://amazon.com'},microsoft:{n:'Microsoft',c:'#00a4ef',l:'M',u:'https://microsoft.com'},apple:{n:'Apple',c:'#000',l:'🍎',u:'https://apple.com'},github:{n:'GitHub',c:'#333',l:'GH',u:'https://github.com'},banking:{n:'Banking',c:'#10b981',l:'🏦',u:''},crypto:{n:'Crypto',c:'#f7931a',l:'₿',u:''},gaming:{n:'Gaming',c:'#8b5cf6',l:'🎮',u:''},wifi:{n:'WiFi',c:'#06b6d4',l:'📶',u:''},other:{n:'Other',c:'#6b7280',l:'📌',u:''}};
function AF(){var c=document.getElementById('fCat').value;if(c&&CATS[c]){document.getElementById('fPlat').value=CATS[c].n;document.getElementById('fUrl').value=CATS[c].u||'';}}

async function LD(){
    if(db){try{var s=await db.collection('passwords').get();passwords=[];s.forEach(function(d){var r=d.data();passwords.push({id:d.id,plat:dec(r.plat||''),cat:dec(r.cat||'other'),user:dec(r.user||''),pass:dec(r.pass||''),url:dec(r.url||''),updatedAt:r.updatedAt||0});});passwords.sort(function(a,b){return(b.updatedAt||0)-(a.updatedAt||0);});US(true);}catch(e){US(false);LL();}}else{US(false);LL();}
    RC();RL();US2();
}
function LL(){var s=localStorage.getItem('pv_data');if(s){try{passwords=JSON.parse(s);}catch(e){passwords=[];}}}
function SL(){localStorage.setItem('pv_data',JSON.stringify(passwords));}
function US(on){var d=document.getElementById('syncDot');d.className='sd '+(on?'on':'off');d.title=on?'Cloud':'Offline';}
function US2(){var t=passwords.length,s=passwords.filter(function(p){return p.pass.length>=12;}).length,w=passwords.filter(function(p){return p.pass.length<8;}).length;document.getElementById('totalCount').textContent=t;document.getElementById('strongCount').textContent=s;document.getElementById('weakCount').textContent=w;document.getElementById('securityScore').textContent=t>0?Math.round(((t-w)/t)*100)+'%':'0%';}
function GS(p){if(p.length>=12)return'strong';if(p.length>=8)return'medium';return'weak';}

async function SV(){
    var cat=document.getElementById('fCat').value,plat=document.getElementById('fPlat').value.trim(),user=document.getElementById('fUser').value.trim(),pass=document.getElementById('fPass').value.trim(),url=document.getElementById('fUrl').value.trim();
    if(!plat||!user||!pass){toast('Fill all fields!');return;}
    var entry={plat:plat,cat:cat||'other',user:user,pass:pass,url:url,updatedAt:Date.now()};
    if(editId){var idx=passwords.findIndex(function(p){return p.id===editId;});if(idx>=0)passwords[idx]=Object.assign({},passwords[idx],entry,{id:editId});toast('Updated!');}
    else{entry.id='local_'+Date.now();passwords.unshift(entry);toast('Saved!');}
    SL();
    if(db){try{var fe={plat:enc(plat),cat:enc(cat||'other'),user:enc(user),pass:enc(pass),url:enc(url),updatedAt:Date.now()};if(editId&&!editId.startsWith('local_')){await db.collection('passwords').doc(editId).update(fe);}else if(!editId){var dr=await db.collection('passwords').add(fe);passwords[0].id=dr.id;SL();}}catch(e){}}
    CM('modalAdd');RC();RL();US2();
}
async function DL(id){if(!confirm('Delete?'))return;passwords=passwords.filter(function(p){return p.id!==id;});SL();if(db&&!id.startsWith('local_')){try{await db.collection('passwords').doc(id).delete();}catch(e){}}RL();US2();toast('Deleted!');}

function RC(){var h='<button class="'+(filter==='all'?'on':'')+'" onclick="SF(\'all\')">📁 All</button>';for(var k in CATS){var v=CATS[k];h+='<button class="'+(filter===k?'on':'')+'" onclick="SF(\''+k+'\')"><span class="cat-dot" style="background:'+v.c+'">'+v.l+'</span>'+v.n+'</button>';}document.getElementById('cats').innerHTML=h;}
function SF(f){filter=f;RC();RL();}

function RL(){
    var q=(document.getElementById('searchInput')?.value||'').toLowerCase();
    var items=filter==='all'?passwords:passwords.filter(function(x){return x.cat===filter;});
    if(q)items=items.filter(function(x){return x.plat.toLowerCase().indexOf(q)!==-1||x.user.toLowerCase().indexOf(q)!==-1||(x.url||'').toLowerCase().indexOf(q)!==-1;});
    var g=document.getElementById('grid');
    if(!items.length){g.innerHTML='<div class="empty-state"><span class="empty-icon">🔐</span><h3>No passwords found</h3></div>';return;}
    g.innerHTML=items.map(function(p){var c=CATS[p.cat]||CATS.other;var st=GS(p.pass);var badge='';if(st==='strong')badge='<span class="strength-badge strength-strong">STRONG</span>';else if(st==='weak')badge='<span class="strength-badge strength-weak">WEAK</span>';else badge='<span class="strength-badge strength-medium">MEDIUM</span>';return'<div class="card"><div class="card-header"><div class="card-logo" style="background:'+c.c+'">'+c.l+'</div><div class="card-info"><h3>'+esc(p.plat)+' '+badge+'</h3><span class="cu">'+esc(p.user)+'</span></div></div><div class="pass-row"><input type="password" value="'+esc(p.pass)+'" id="vp'+p.id+'" readonly><button class="icon-btn" onclick="RV(\''+p.id+'\',\''+esc(p.plat)+'\')">👁</button><button class="icon-btn" onclick="CP(\''+p.id+'\')">📋</button></div>'+(p.url?'<div style="font-size:11px;color:var(--muted);margin-bottom:8px">🔗 '+esc(p.url)+'</div>':'')+'<div class="card-actions"><button onclick="ED(\''+p.id+'\')">✏️ Edit</button><button class="del-btn" onclick="DL(\''+p.id+'\')">🗑️ Delete</button></div></div>';}).join('');
}

function RV(id,plat){vt=id;vp='';DV();document.getElementById('pvError').style.opacity='0';document.getElementById('viewPlatName').textContent=plat;document.getElementById('modalView').classList.add('on');}
function CP(id){var p=passwords.find(function(x){return x.id===id;});if(p){navigator.clipboard.writeText(p.pass);toast('Copied!');}}

function SA(){editId=null;document.getElementById('modalTitle').textContent='Add Password';['fPlat','fUser','fPass','fUrl'].forEach(function(id){document.getElementById(id).value='';});document.getElementById('fCat').value='';document.getElementById('fPass').type='password';document.getElementById('modalAdd').classList.add('on');}
function ED(id){var p=passwords.find(function(x){return x.id===id;});if(!p)return;editId=id;document.getElementById('modalTitle').textContent='Edit Password';document.getElementById('fCat').value=p.cat;document.getElementById('fPlat').value=p.plat;document.getElementById('fUser').value=p.user;document.getElementById('fPass').value=p.pass;document.getElementById('fUrl').value=p.url||'';document.getElementById('fPass').type='password';document.getElementById('modalAdd').classList.add('on');}
function CM(id){document.getElementById(id).classList.remove('on');if(id==='modalAdd')editId=null;if(id==='modalView'){vt=null;vp='';DV();}if(id==='modalExport'){et=null;ep='';DE();}}
function GP(){var c='ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*_+-=';var p='';for(var i=0;i<16;i++)p+=c[Math.floor(Math.random()*c.length)];document.getElementById('fPass').value=p;toast('Generated!');}
function TG(id){var e=document.getElementById(id);if(e)e.type=e.type==='password'?'text':'password';}

function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.style.display='block';clearTimeout(t._t);t._t=setTimeout(function(){t.style.display='none';},2500);}

['modalAdd','modalView','modalExport'].forEach(function(id){document.getElementById(id).addEventListener('click',function(e){if(e.target===this)CM(id);});});
document.addEventListener('keydown',function(e){if(e.key==='Escape'){CM('modalAdd');CM('modalView');CM('modalExport');}});
var idle;function RI(){clearTimeout(idle);if(document.getElementById('app').style.display!=='none')idle=setTimeout(function(){LK();toast('Auto-locked!');},10*60*1000);}
['mousemove','click','keypress','scroll','touchstart'].forEach(function(ev){document.addEventListener(ev,RI);});
RC();RL();US2();
</script>
